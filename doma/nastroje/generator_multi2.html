<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generátor bloků · Chceš myš?</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f0d0a; --s: #171410; --s2: #1e1a14; --cream: #e8e0d0;
            --dim: rgba(232,224,208,0.42); --accent: #a89880;
            --border: rgba(168,152,128,0.14); --border-hi: rgba(168,152,128,0.3);
            --serif: 'Cormorant Garamond', serif; --mono: 'DM Mono', monospace;
        }
        body { background: var(--bg); color: var(--cream); font-family: var(--mono); font-size: 13px; line-height: 1.8; padding: 30px 20px; }
        .wrap { max-width: 1200px; margin: 0 auto; }

        nav {
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
            background: rgba(15,13,10,0.94); backdrop-filter: blur(14px);
            padding: 11px 24px; display: flex; align-items: center;
            justify-content: space-between; flex-wrap: wrap; gap: 10px;
            margin-bottom: 30px;
        }
        .nav-brand { font-family: var(--serif); font-size: 0.88rem; font-weight: 300; }
        .nav-brand em { font-style: italic; color: var(--accent); }
        .nav-links { display: flex; gap: 4px; flex-wrap: wrap; }
        .nav-link { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); padding: 4px 9px; border: 1px solid transparent; transition: all 0.12s; }
        .nav-link:hover { color: var(--cream); border-color: var(--border); }

        .toolbar {
            background: var(--s); border: 1px solid var(--border);
            padding: 15px; margin-bottom: 20px;
            display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
            justify-content: space-between;
        }
        .dataset-selector { display: flex; align-items: center; gap: 8px; }
        .dataset-selector select { background: var(--s2); border: 1px solid var(--border); padding: 5px 10px; font-family: var(--mono); color: var(--cream); }
        button { background: var(--s); border: 1px solid var(--border); color: var(--cream); padding: 5px 12px; font-family: var(--mono); font-size: 0.7rem; cursor: pointer; }
        button:hover { border-color: var(--accent); }
        button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        .filter-area {
            display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
            margin-bottom: 20px; padding: 12px; background: var(--s2); border: 1px solid var(--border);
        }
        .filter-group { display: flex; align-items: center; gap: 6px; }
        .filter-group label { font-size: 0.7rem; text-transform: uppercase; color: var(--dim); }
        .filter-group input, .filter-group select {
            background: var(--s); border: 1px solid var(--border);
            padding: 4px 8px; color: var(--cream); font-family: var(--mono); font-size: 0.7rem;
        }
        .blocks-grid {
            display: flex; flex-wrap: wrap; gap: 12px; margin: 20px 0;
            max-height: 500px; overflow-y: auto; padding: 4px;
        }
        .block-card {
            background: var(--s); border: 1px solid var(--border);
            width: 260px; padding: 12px; cursor: pointer; transition: 0.1s;
        }
        .block-card.selected { background: var(--s2); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
        .block-text { font-family: var(--serif); font-size: 0.85rem; margin-bottom: 8px; }
        .block-meta { font-size: 0.6rem; color: var(--dim); display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .block-meta span { background: var(--bg); padding: 1px 4px; }
        .controls { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; margin: 20px 0; }
        .output-area { background: var(--s); border: 1px solid var(--border); padding: 20px; margin: 20px 0; white-space: pre-wrap; font-family: var(--serif); font-size: 0.9rem; line-height: 1.8; }
        .visual-inspiration { display: flex; gap: 12px; justify-content: center; margin: 20px 0; }
        .visual-inspiration img { width: 70px; height: 70px; object-fit: cover; border: 1px solid var(--border); filter: grayscale(1); }
        footer { margin-top: 60px; border-top: 1px solid var(--border); padding-top: 20px; font-size: 0.7rem; color: var(--dim); text-align: center; }
    </style>
</head>
<body>
<div class="wrap">
    <nav>
        <span class="nav-brand"><em>Chceš myš?</em> — generátor bloků</span>
        <div class="nav-links">
            <a class="nav-link" href="laborator.html">🔮 Laboratoř</a>
            <a class="nav-link" href="generator_demo.html">🎭 Demo generátor</a>
            <a class="nav-link" href="zapisnik.html">📓 Zápisník</a>
        </div>
    </nav>

    <div class="toolbar">
        <div class="dataset-selector">
            <span>📂 Dataset:</span>
            <select id="datasetSelect">
                <option value="free_20.json">Demo (free_20.json)</option>
                <option value="0_100.json">0–100</option>
                <option value="101_200.json">101–200</option>
                <option value="201_300.json">201–300</option>
                <option value="301_400.json">301–400</option>
                <option value="vlastni_1.json">Vlastní 1</option>
                <option value="vlastni_2.json">Vlastní 2</option>
            </select>
            <button id="loadDatasetBtn" class="primary">Načíst</button>
        </div>
        <div>
            <button id="randomBlocksBtn">🎲 Náhodné bloky</button>
            <button id="clearSelectionBtn">✖ Zrušit výběr</button>
        </div>
    </div>

    <div class="filter-area">
        <div class="filter-group"><label>Typ:</label><select id="filterType"><option value="">Vše</option></select></div>
        <div class="filter-group"><label>Pole:</label><input id="filterFields" placeholder="hledat"></div>
        <div class="filter-group"><label>Intenzita:</label><select id="filterIntensity"><option value="">Vše</option><option>nízká</option><option>střední</option><option>vysoká</option></select></div>
        <div class="filter-group"><label>Movement:</label><input id="filterMovement" placeholder="část"></div>
        <button id="applyFilters">Filtrovat</button>
        <button id="resetFilters">Reset</button>
    </div>

    <div id="blocksGrid" class="blocks-grid"></div>

    <div class="controls">
        <div class="filter-group"><label>🎭 Doména:</label><select id="domainSelect">
            <option value="science">🔬 Věda / teorie</option>
            <option value="film">🎬 Film / scénář</option>
            <option value="theater">🎭 Divadlo / postavy</option>
            <option value="visual">🎨 Vizuální umění</option>
            <option value="choreo">💃 Choreografie</option>
            <option value="game">🎮 Herní design</option>
            <option value="performance">✨ Performativní umění</option>
        </select></div>
        <button id="generateBtn" class="primary">Generovat kombinaci</button>
    </div>

    <div class="visual-inspiration" id="visualInspiration"></div>

    <div class="output-area" id="outputArea">Zde se objeví vygenerovaný výstup.</div>
    <button id="saveToNotebookBtn">📥 Uložit do zápisníku</button>

    <footer>Generátor bloků · Kombinuj bloky z datasetů, filtruj metadata.</footer>
</div>

<script>
    // -------------------- DATA --------------------
    let allBlocks = [], filteredBlocks = [], selectedBlocks = [];
    let currentDomain = "science", lastGeneratedOutput = "";

    const templates = {
        science: (b1,b2) => `Hypotéza: Kombinace fenoménu „${b1.text}“ a fenoménu „${b2.text}“ naznačuje nový vztah mezi ${(b1.fields && b1.fields[0]) || 'prvním'} a ${(b2.fields && b2.fields[0]) || 'druhým'}.`,
        film: (b1,b2) => `Scénář: Postava A ztělesňuje „${b1.text}“. Postava B ztělesňuje „${b2.text}“. Konflikt...`,
        theater: (b1,b2) => `Divadelní postavy: 1: „${b1.text}“ – jak mluví? 2: „${b2.text}“ – tajné přání?`,
        visual: (b1,b2) => `Vizuální umění: Kombinace „${b1.text}“ + „${b2.text}“. Doporučená technika: koláž.`,
        choreo: (b1,b2) => `Choreografie: Kontrast „${b1.text}“ a plynulosti „${b2.text}“.`,
        game: (b1,b2) => `Herní design: Mechanika: „${b1.text}“. Cíl: „${b2.text}“.`,
        performance: (b1,b2) => `Performativní umění: Intervence spojující „${b1.text}“ s „${b2.text}“.`
    };

    async function loadDataset(filename) {
        try {
            const response = await fetch(`../dataset/${filename}`);
            if (!response.ok) throw new Error();
            const data = await response.json();
            allBlocks = Array.isArray(data) ? data : (data.blocks || []);
            updateFilterOptions();
            applyFilters();
        } catch (err) {
            alert(`Nepodařilo se načíst ${filename}.`);
            allBlocks = []; filteredBlocks = [];
            renderBlocks();
        }
    }

    function updateFilterOptions() {
        const types = [...new Set(allBlocks.map(b => b.type).filter(t => t))];
        filterType.innerHTML = '<option value="">Vše</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    function applyFilters() {
        const typeVal = filterType.value;
        const fieldsVal = filterFields.value.trim().toLowerCase();
        const intensityVal = filterIntensity.value;
        const movementVal = filterMovement.value.trim().toLowerCase();

        filteredBlocks = allBlocks.filter(block => {
            if (typeVal && block.type !== typeVal) return false;
            if (intensityVal && block.intensity !== intensityVal) return false;
            if (fieldsVal) {
                const fieldsStr = (block.fields || []).join(' ').toLowerCase();
                if (!fieldsStr.includes(fieldsVal)) return false;
            }
            if (movementVal) {
                const movStr = (block.movement || '').toLowerCase();
                if (!movStr.includes(movementVal)) return false;
            }
            return true;
        });
        renderBlocks();
    }

    function resetFilters() {
        filterType.value = '';
        filterFields.value = '';
        filterIntensity.value = '';
        filterMovement.value = '';
        applyFilters();
    }

    function renderBlocks() {
        blocksGrid.innerHTML = '';
        if (filteredBlocks.length === 0) {
            blocksGrid.innerHTML = '<p style="color:var(--dim);">Žádné bloky neodpovídají filtrům.</p>';
            return;
        }
        filteredBlocks.forEach(block => {
            const card = document.createElement('div');
            card.className = 'block-card';
            if (selectedBlocks.includes(block)) card.classList.add('selected');
            card.innerHTML = `
                <div class="block-text">“${escapeHtml(block.text)}”</div>
                <div class="block-meta">
                    <span>${block.type || '?'}</span>
                    <span>${block.intensity || '?'}</span>
                    <span>${block.movement || '?'}</span>
                    <span>${(block.fields || []).slice(0,2).join(', ')}</span>
                </div>
            `;
            card.addEventListener('click', () => {
                const idx = selectedBlocks.indexOf(block);
                if (idx !== -1) {
                    selectedBlocks.splice(idx, 1);
                    card.classList.remove('selected');
                } else {
                    if (selectedBlocks.length >= 2) { alert('Max 2 bloky.'); return; }
                    selectedBlocks.push(block);
                    card.classList.add('selected');
                }
            });
            blocksGrid.appendChild(card);
        });
    }

    function randomBlocks() {
        if (filteredBlocks.length === 0) return;
        const shuffled = [...filteredBlocks];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        selectedBlocks = shuffled.slice(0, 2);
        renderBlocks();
    }

    function clearSelection() { selectedBlocks = []; renderBlocks(); }

    function generateOutput() {
        if (selectedBlocks.length !== 2) { alert('Vyber dva bloky.'); return; }
        currentDomain = domainSelect.value;
        const template = templates[currentDomain] || templates.science;
        lastGeneratedOutput = template(selectedBlocks[0], selectedBlocks[1]);
        outputArea.innerHTML = lastGeneratedOutput;
    }

    function saveToNotebook() {
        if (!lastGeneratedOutput) { alert('Nejprve něco vygeneruj.'); return; }
        const domainLabel = domainSelect.options[domainSelect.selectedIndex].text;
        let notebook = JSON.parse(localStorage.getItem('chcesmys_lab_notebook') || '[]');
        notebook.unshift({
            id: 'multi_' + Date.now(),
            timestamp: Date.now(),
            content: lastGeneratedOutput,
            domain: currentDomain,
            domainLabel: domainLabel,
            source: 'multi_generator'
        });
        localStorage.setItem('chcesmys_lab_notebook', JSON.stringify(notebook));
        alert('Uloženo do zápisníku.');
    }

    const animalImages = ["mys.jpg","kocour.jpg","ryba.jpg","zajic.jpg","slon.jpg","cap.jpg","pav.jpg","vrabec.jpg","drak.jpg","motyl.jpg"];
    function renderVisual() {
        const shuffled = [...animalImages].sort(() => 0.5 - Math.random());
        visualInspirationDiv.innerHTML = shuffled.slice(0,3).map(img => `<img src="../ilustrace/${img}" alt="inspirace" onerror="this.style.display='none'">`).join('');
    }

    function escapeHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    const datasetSelect = document.getElementById('datasetSelect');
    const loadBtn = document.getElementById('loadDatasetBtn');
    const randomBlocksBtn = document.getElementById('randomBlocksBtn');
    const clearSelectionBtn = document.getElementById('clearSelectionBtn');
    const filterType = document.getElementById('filterType');
    const filterFields = document.getElementById('filterFields');
    const filterIntensity = document.getElementById('filterIntensity');
    const filterMovement = document.getElementById('filterMovement');
    const applyFiltersBtn = document.getElementById('applyFilters');
    const resetFiltersBtn = document.getElementById('resetFilters');
    const blocksGrid = document.getElementById('blocksGrid');
    const domainSelect = document.getElementById('domainSelect');
    const generateBtn = document.getElementById('generateBtn');
    const outputArea = document.getElementById('outputArea');
    const saveToNotebookBtn = document.getElementById('saveToNotebookBtn');
    const visualInspirationDiv = document.getElementById('visualInspiration');

    loadBtn.addEventListener('click', () => loadDataset(datasetSelect.value));
    randomBlocksBtn.addEventListener('click', randomBlocks);
    clearSelectionBtn.addEventListener('click', clearSelection);
    applyFiltersBtn.addEventListener('click', applyFilters);
    resetFiltersBtn.addEventListener('click', resetFilters);
    generateBtn.addEventListener('click', generateOutput);
    saveToNotebookBtn.addEventListener('click', saveToNotebook);

    loadDataset('free_20.json');
    renderVisual();
</script>
</body>
</html>
