<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratoř · Chceš myš?</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f0d0a; --s: #171410; --s2: #1e1a14; --cream: #e8e0d0;
            --dim: rgba(232,224,208,0.42); --dim2: rgba(232,224,208,0.2);
            --accent: #a89880; --accent2: #786858;
            --border: rgba(168,152,128,0.14); --border-hi: rgba(168,152,128,0.3);
            --serif: 'Cormorant Garamond', serif; --mono: 'DM Mono', monospace;
        }
        body {
            background: var(--bg); color: var(--cream);
            font-family: var(--mono); font-size: 13px; line-height: 1.8;
            padding: 30px 20px;
        }
        .wrap { max-width: 1300px; margin: 0 auto; }

        nav {
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
            background: rgba(15,13,10,0.94); backdrop-filter: blur(14px);
            padding: 11px 24px; display: flex; align-items: center;
            justify-content: space-between; flex-wrap: wrap; gap: 10px;
            margin-bottom: 30px;
        }
        .nav-brand { font-family: var(--serif); font-size: 0.88rem; font-weight: 300; }
        .nav-brand em { font-style: italic; color: var(--accent); }
        .nav-links { display: flex; gap: 4px; flex-wrap: wrap; }
        .nav-link {
            font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--dim); padding: 4px 9px; border: 1px solid transparent;
            transition: all 0.12s;
        }
        .nav-link:hover { color: var(--cream); border-color: var(--border); }

        .tabs {
            display: flex; gap: 1px; background: var(--border); margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .tab {
            flex: 1; background: var(--s); padding: 12px; text-align: center;
            cursor: pointer; font-size: 0.8rem; letter-spacing: 0.1em;
            text-transform: uppercase; transition: 0.12s;
        }
        .tab.active { background: var(--accent); color: var(--bg); }
        .tab:not(.active):hover { background: var(--s2); }

        .panel { display: none; }
        .panel.active { display: block; }

        .toolbar {
            background: var(--s); border: 1px solid var(--border);
            padding: 15px; margin-bottom: 20px;
            display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
            justify-content: space-between;
        }
        .dataset-selector { display: flex; align-items: center; gap: 8px; }
        .dataset-selector select, button {
            background: var(--s2); border: 1px solid var(--border);
            padding: 5px 10px; font-family: var(--mono); color: var(--cream);
            cursor: pointer;
        }
        button { background: var(--s); }
        button:hover { border-color: var(--accent); }
        button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        .filter-area {
            display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
            margin-bottom: 20px; padding: 12px; background: var(--s2);
            border: 1px solid var(--border);
        }
        .filter-group { display: flex; align-items: center; gap: 6px; }
        .filter-group label { font-size: 0.7rem; text-transform: uppercase; color: var(--dim); }
        .filter-group input, .filter-group select {
            background: var(--s); border: 1px solid var(--border);
            padding: 4px 8px; color: var(--cream); font-family: var(--mono);
            font-size: 0.7rem;
        }

        .blocks-grid {
            display: flex; flex-wrap: wrap; gap: 12px; margin: 20px 0;
            max-height: 400px; overflow-y: auto; padding: 4px;
        }
        .block-card {
            background: var(--s); border: 1px solid var(--border);
            width: 280px; padding: 12px; cursor: pointer; transition: 0.1s;
        }
        .block-card.selected { background: var(--s2); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
        .block-text { font-family: var(--serif); font-size: 0.85rem; margin-bottom: 8px; }
        .block-meta { font-size: 0.6rem; color: var(--dim); display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .block-meta span { background: var(--bg); padding: 1px 4px; }

        .detail-panel {
            background: var(--s2); border: 1px solid var(--border);
            padding: 15px; margin-top: 20px;
        }
        .detail-panel h3 { font-family: var(--serif); margin-bottom: 12px; }
        .detail-field { margin-bottom: 8px; }
        .detail-field label { font-size: 0.7rem; text-transform: uppercase; display: inline-block; width: 80px; }
        .detail-field input, .detail-field textarea, .detail-field select {
            background: var(--s); border: 1px solid var(--border);
            color: var(--cream); padding: 4px 8px; width: 300px; font-family: var(--mono);
        }
        .detail-field textarea { width: 100%; resize: vertical; }
        .saved-blocks-grid {
            display: flex; flex-wrap: wrap; gap: 12px; margin: 20px 0;
        }
        .saved-card {
            background: var(--s); border: 1px solid var(--border);
            width: 280px; padding: 12px; margin-bottom: 12px;
        }

        footer {
            margin-top: 60px; border-top: 1px solid var(--border);
            padding-top: 20px; font-size: 0.7rem; color: var(--dim2);
            text-align: center;
        }
    </style>
</head>
<body>
<div class="wrap">
    <nav>
        <span class="nav-brand"><em>Chceš myš?</em> — laboratoř</span>
        <div class="nav-links">
            <a class="nav-link" href="generator_multi.html">🔄 Generátor</a>
            <a class="nav-link" href="generator_demo.html">🎭 Demo generátor</a>
            <a class="nav-link" href="../index.html">🏠 Hlavní stránka</a>
        </div>
    </nav>

    <div class="tabs">
        <div class="tab active" data-tab="blocks">📚 Knihovna bloků</div>
        <div class="tab" data-tab="library">📓 Uložené bloky</div>
    </div>

    <div id="blocks-panel" class="panel active">
        <div class="toolbar">
            <div class="dataset-selector">
                <span>📂 Dataset:</span>
                <select id="datasetSelect">
                    <option value="free_20.json">Demo (free_20.json)</option>
                    <option value="0_100.json">0–100</option>
                    <option value="101_200.json">101–200</option>
                    <option value="201_300.json">201–300</option>
                    <option value="301_400.json">301–400</option>
                    <option value="vlastni_1.json">Vlastní 1</option>
                    <option value="vlastni_2.json">Vlastní 2</option>
                </select>
                <button id="loadDatasetBtn" class="primary">Načíst</button>
            </div>
            <div>
                <button id="exportUserBlocksBtn">⬇ Export knihovny</button>
                <label style="margin-left:8px;">📂 Import JSON: <input type="file" id="importBlocksFile" accept=".json"></label>
            </div>
        </div>

        <div class="filter-area">
            <div class="filter-group"><label>Typ:</label><select id="filterType"><option value="">Vše</option></select></div>
            <div class="filter-group"><label>Pole:</label><input id="filterFields" placeholder="hledat"></div>
            <div class="filter-group"><label>Intenzita:</label><select id="filterIntensity"><option value="">Vše</option><option>nízká</option><option>střední</option><option>vysoká</option></select></div>
            <div class="filter-group"><label>Movement:</label><input id="filterMovement" placeholder="část"></div>
            <button id="applyFilters">Filtrovat</button>
            <button id="resetFilters">Reset</button>
        </div>

        <div id="blocksGrid" class="blocks-grid"></div>

        <div id="detailPanel" class="detail-panel" style="display:none;">
            <h3>Detail bloku</h3>
            <div class="detail-field"><label>Text:</label><textarea id="editText" rows="3"></textarea></div>
            <div class="detail-field"><label>Typ:</label><input id="editType"></div>
            <div class="detail-field"><label>Funkce:</label><input id="editFunction"></div>
            <div class="detail-field"><label>Pole (fields):</label><input id="editFields" placeholder="čárkou oddělená"></div>
            <div class="detail-field"><label>Movement:</label><select id="editMovement">
                <option value="mýtus → deformacja">mýtus → deformacja</option><option value="sebeobraz → vyprázdnění">sebeobraz → vyprázdnění</option>
                <option value="příběh → marketing">příběh → marketing</option><option value="zvuk → past">zvuk → past</option>
                <option value="dezorientace → kritika">dezorientace → kritika</option><option value="stupeň → odhalení">stupeň → odhalení</option>
                <option value="pochybnost → potvrzení">pochybnost → potvrzení</option><option value="skrytost → odhalení">skrytost → odhalení</option>
                <option value="cyklus → přetvoření">cyklus → přetvoření</option><option value="dohled → otupění">dohled → otupění</option>
                <option value="setrvačnost → odhalení">setrvačnost → odhalení</option><option value="potlačení → vyprázdnění">potlačení → vyprázdnění</option>
                <option value="tanec → rozpad">tanec → rozpad</option><option value="stopa → zranění">stopa → zranění</option>
                <option value="napětí → klid">napětí → klid</option><option value="hranice → rozpuštění">hranice → rozpuštění</option>
                <option value="náraz → nejistota">náraz → nejistota</option><option value="hledání → smíření">hledání → smíření</option>
                <option value="iluze → zmatek">iluze → zmatek</option><option value="zastavení → ozvěna">zastavení → ozvěna</option>
            </select></div>
            <div class="detail-field"><label>Intenzita:</label><select id="editIntensity"><option>nízká</option><option>střední</option><option>vysoká</option></select></div>
            <div class="detail-field"><label>Poznámka:</label><textarea id="editNote" rows="2" placeholder="vlastní poznámka"></textarea></div>
            <button id="saveBlockChanges">Uložit změny</button>
            <button id="deleteBlockBtn" style="margin-left:12px;">🗑 Smazat blok (pouze z knihovny)</button>
        </div>
    </div>

    <div id="library-panel" class="panel">
        <div id="savedBlocksGrid" class="saved-blocks-grid"></div>
        <div class="controls">
            <button id="exportAllBtn">⬇ Export celé knihovny</button>
            <button id="clearAllBtn">🗑 Smazat vše</button>
        </div>
    </div>

    <footer>Laboratoř · Prohlížení, filtrování, editace a správa bloků.</footer>
</div>

<script>
    // -------------------- DATA --------------------
    let allBlocks = [];
    let filteredBlocks = [];
    let userBlocks = [];
    let currentDataset = 'free_20.json';
    let currentEditingBlock = null;

    // DOM elements
    const datasetSelect = document.getElementById('datasetSelect');
    const loadBtn = document.getElementById('loadDatasetBtn');
    const filterType = document.getElementById('filterType');
    const filterFields = document.getElementById('filterFields');
    const filterIntensity = document.getElementById('filterIntensity');
    const filterMovement = document.getElementById('filterMovement');
    const applyFiltersBtn = document.getElementById('applyFilters');
    const resetFiltersBtn = document.getElementById('resetFilters');
    const blocksGrid = document.getElementById('blocksGrid');
    const detailPanel = document.getElementById('detailPanel');
    const editText = document.getElementById('editText');
    const editType = document.getElementById('editType');
    const editFunction = document.getElementById('editFunction');
    const editFields = document.getElementById('editFields');
    const editMovement = document.getElementById('editMovement');
    const editIntensity = document.getElementById('editIntensity');
    const editNote = document.getElementById('editNote');
    const saveBlockChanges = document.getElementById('saveBlockChanges');
    const deleteBlockBtn = document.getElementById('deleteBlockBtn');
    const savedBlocksGrid = document.getElementById('savedBlocksGrid');
    const exportUserBlocksBtn = document.getElementById('exportUserBlocksBtn');
    const importBlocksFile = document.getElementById('importBlocksFile');
    const exportAllBtn = document.getElementById('exportAllBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');

    // -------------------- NAČTENÍ DAT --------------------
    async function loadDataset(filename) {
        try {
            const response = await fetch(`../dataset/${filename}`);
            if (!response.ok) throw new Error();
            const data = await response.json();
            if (Array.isArray(data)) allBlocks = data;
            else if (data.blocks && Array.isArray(data.blocks)) allBlocks = data.blocks;
            else throw new Error();
            updateFilterOptions();
            applyFilters();
            loadUserBlocks();
            currentEditingBlock = null;
            detailPanel.style.display = 'none';
        } catch(err) {
            alert(`Nepodařilo se načíst ${filename}.`);
            allBlocks = [];
            filteredBlocks = [];
            renderBlocks();
        }
    }

    function loadUserBlocks() {
        const stored = localStorage.getItem('chcesmys_user_blocks');
        if (stored) {
            try { userBlocks = JSON.parse(stored); } catch(e) { userBlocks = []; }
        } else userBlocks = [];
        renderSavedBlocks();
    }

    function saveUserBlocks() {
        localStorage.setItem('chcesmys_user_blocks', JSON.stringify(userBlocks));
        renderSavedBlocks();
    }

    function updateFilterOptions() {
        const types = [...new Set(allBlocks.map(b => b.type).filter(t => t))];
        filterType.innerHTML = '<option value="">Vše</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    function applyFilters() {
        const typeVal = filterType.value;
        const fieldsVal = filterFields.value.trim().toLowerCase();
        const intensityVal = filterIntensity.value;
        const movementVal = filterMovement.value.trim().toLowerCase();

        filteredBlocks = allBlocks.filter(block => {
            if (typeVal && block.type !== typeVal) return false;
            if (intensityVal && block.intensity !== intensityVal) return false;
            if (fieldsVal) {
                const fieldsStr = (block.fields || []).join(' ').toLowerCase();
                if (!fieldsStr.includes(fieldsVal)) return false;
            }
            if (movementVal) {
                const movStr = (block.movement || '').toLowerCase();
                if (!movStr.includes(movementVal)) return false;
            }
            return true;
        });
        renderBlocks();
    }

    function resetFilters() {
        filterType.value = '';
        filterFields.value = '';
        filterIntensity.value = '';
        filterMovement.value = '';
        applyFilters();
    }

    function renderBlocks() {
        blocksGrid.innerHTML = '';
        if (filteredBlocks.length === 0) {
            blocksGrid.innerHTML = '<p style="color:var(--dim);">Žádné bloky neodpovídají filtrům.</p>';
            return;
        }
        filteredBlocks.forEach(block => {
            const card = document.createElement('div');
            card.className = 'block-card';
            card.innerHTML = `
                <div class="block-text">“${escapeHtml(block.text)}”</div>
                <div class="block-meta">
                    <span>${block.type || '?'}</span>
                    <span>${block.intensity || '?'}</span>
                    <span>${block.movement || '?'}</span>
                    <span>${(block.fields || []).slice(0,2).join(', ')}</span>
                </div>
            `;
            card.addEventListener('click', () => {
                currentEditingBlock = block;
                fillEditForm(block);
                detailPanel.style.display = 'block';
            });
            blocksGrid.appendChild(card);
        });
    }

    function fillEditForm(block) {
        editText.value = block.text || '';
        editType.value = block.type || '';
        editFunction.value = block.function || '';
        editFields.value = (block.fields || []).join(', ');
        if (editMovement.querySelector(`option[value="${block.movement}"]`)) editMovement.value = block.movement;
        editIntensity.value = block.intensity || 'střední';
        editNote.value = block.note || '';
    }

    function saveEditedBlock() {
        if (!currentEditingBlock) return;
        currentEditingBlock.text = editText.value;
        currentEditingBlock.type = editType.value;
        currentEditingBlock.function = editFunction.value;
        currentEditingBlock.fields = editFields.value.split(',').map(s=>s.trim()).filter(s=>s);
        currentEditingBlock.movement = editMovement.value;
        currentEditingBlock.intensity = editIntensity.value;
        currentEditingBlock.note = editNote.value;
        // Pokud jde o blok z datasetu, nelze ho uložit do datasetu – upozorníme, že se ukládá jen kopie
        if (!currentEditingBlock.id || currentEditingBlock.id.toString().startsWith('user_')) {
            // už je to user block, aktualizujeme
            const idx = userBlocks.findIndex(b => b.id === currentEditingBlock.id);
            if (idx !== -1) userBlocks[idx] = currentEditingBlock;
            else userBlocks.push(currentEditingBlock);
            saveUserBlocks();
        } else {
            // vytvoříme nový uživatelský blok jako kopii
            const newBlock = { ...currentEditingBlock, id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2,6), source: 'user' };
            userBlocks.push(newBlock);
            saveUserBlocks();
            alert('Blok uložen jako kopie v knihovně (původní dataset zůstal nezměněn).');
        }
        renderBlocks(); // obnoví zobrazení (pokud se změnil text)
    }

    deleteBlockBtn.addEventListener('click', () => {
        if (!currentEditingBlock) return;
        // Pokud je to uživatelský blok, smažeme ho z userBlocks
        const idx = userBlocks.findIndex(b => b.id === currentEditingBlock.id);
        if (idx !== -1) {
            userBlocks.splice(idx, 1);
            saveUserBlocks();
            currentEditingBlock = null;
            detailPanel.style.display = 'none';
            alert('Blok smazán z knihovny.');
        } else {
            alert('Blok z datasetu nelze smazat, ale můžete si ho zkopírovat a upravit v knihovně.');
        }
        renderBlocks();
    });

    // -------------------- KNIHOVNA (ULOŽENÉ BLOKY) --------------------
    function renderSavedBlocks() {
        savedBlocksGrid.innerHTML = '';
        if (userBlocks.length === 0) {
            savedBlocksGrid.innerHTML = '<p style="color:var(--dim);">Žádné uložené bloky. Vygeneruj je v generátoru nebo si vytvoř vlastní.</p>';
            return;
        }
        userBlocks.forEach(block => {
            const card = document.createElement('div');
            card.className = 'saved-card';
            card.innerHTML = `
                <div class="block-text">“${escapeHtml(block.text)}”</div>
                <div class="block-meta">
                    <span>${block.type || '?'}</span>
                    <span>${block.intensity || '?'}</span>
                    <span>${block.movement || '?'}</span>
                    <span>${(block.fields || []).slice(0,2).join(', ')}</span>
                </div>
                <div style="margin-top:6px;"><button class="edit-saved" data-id="${block.id}">✏️ Upravit</button> <button class="delete-saved" data-id="${block.id}">🗑 Smazat</button></div>
            `;
            card.querySelector('.edit-saved').addEventListener('click', () => {
                currentEditingBlock = block;
                fillEditForm(block);
                detailPanel.style.display = 'block';
                document.querySelector('.tab[data-tab="blocks"]').click(); // přepneme na záložku knihovny bloků
            });
            card.querySelector('.delete-saved').addEventListener('click', () => {
                const id = block.id;
                const newUserBlocks = userBlocks.filter(b => b.id !== id);
                userBlocks = newUserBlocks;
                saveUserBlocks();
                renderSavedBlocks();
            });
            savedBlocksGrid.appendChild(card);
        });
    }

    // -------------------- EXPORT / IMPORT --------------------
    function exportUserBlocks() {
        const dataStr = JSON.stringify(userBlocks, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `chcesmys_knihovna_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importUserBlocks(file) {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    userBlocks = imported;
                    saveUserBlocks();
                    alert(`Načteno ${imported.length} bloků.`);
                } else alert('Soubor není pole.');
            } catch(err) { alert('Chyba JSON.'); }
        };
        reader.readAsText(file);
    }

    function exportAll() {
        const all = [...allBlocks, ...userBlocks];
        const dataStr = JSON.stringify(all, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `chcesmys_vsechny_bloky_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function clearAll() {
        if (confirm('Smazat všechny uživatelské bloky (knihovnu)?')) {
            userBlocks = [];
            saveUserBlocks();
        }
    }

    // -------------------- EVENTY --------------------
    loadBtn.addEventListener('click', () => loadDataset(datasetSelect.value));
    applyFiltersBtn.addEventListener('click', applyFilters);
    resetFiltersBtn.addEventListener('click', resetFilters);
    saveBlockChanges.addEventListener('click', saveEditedBlock);
    exportUserBlocksBtn.addEventListener('click', exportUserBlocks);
    importBlocksFile.addEventListener('change', e => {
        if (e.target.files.length) importUserBlocks(e.target.files[0]);
        e.target.value = '';
    });
    exportAllBtn.addEventListener('click', exportAll);
    clearAllBtn.addEventListener('click', clearAll);

    // TABS
    const tabs = document.querySelectorAll('.tab');
    const panels = {
        blocks: document.getElementById('blocks-panel'),
        library: document.getElementById('library-panel')
    };
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.getAttribute('data-tab');
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            Object.values(panels).forEach(p => p.classList.remove('active'));
            panels[target].classList.add('active');
            if (target === 'library') renderSavedBlocks();
        });
    });

    function escapeHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // Počáteční načtení
    loadDataset('free_20.json');
    loadUserBlocks();
</script>
</body>
</html>
