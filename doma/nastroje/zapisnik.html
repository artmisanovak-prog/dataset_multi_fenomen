<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zápisník · Chceš myš?</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f0d0a; --s: #171410; --s2: #1e1a14; --cream: #e8e0d0;
            --dim: rgba(232,224,208,0.42); --accent: #a89880;
            --border: rgba(168,152,128,0.14);
            --serif: 'Cormorant Garamond', serif; --mono: 'DM Mono', monospace;
        }
        body {
            background: var(--bg); color: var(--cream);
            font-family: var(--mono); font-size: 13px; line-height: 1.8;
            padding: 30px 20px;
        }
        .wrap { max-width: 800px; margin: 0 auto; }
        h1 { font-family: var(--serif); font-size: 2rem; font-weight: 300; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .entry {
            background: var(--s); border: 1px solid var(--border);
            margin-bottom: 12px; padding: 12px;
        }
        .entry-meta { font-size: 0.6rem; color: var(--dim); margin-bottom: 6px; }
        .entry-text { font-family: var(--serif); font-size: 0.85rem; line-height: 1.6; white-space: pre-wrap; }
        .entry-actions { margin-top: 8px; display: flex; gap: 8px; }
        button {
            background: var(--s2); border: 1px solid var(--border);
            color: var(--cream); padding: 4px 12px; font-family: var(--mono);
            font-size: 0.7rem; cursor: pointer;
        }
        button:hover { border-color: var(--accent); }
        .controls { margin: 20px 0; display: flex; gap: 12px; }
        footer { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 16px; text-align: center; font-size: 0.7rem; color: var(--dim); }
    </style>
</head>
<body>
<div class="wrap">
    <h1>📓 Zápisník mezer</h1>
    <div class="controls">
        <button id="exportBtn">⬇ Export JSON</button>
        <button id="importBtn">📂 Import JSON</button>
        <button id="clearBtn">🗑 Smazat vše</button>
        <input type="file" id="importFile" accept=".json" style="display:none;">
    </div>
    <div id="entriesContainer"></div>
    <footer>Zápisník sdílí data s laboratoří a generátory.</footer>
</div>

<script>
    const STORAGE_KEY = 'chcesmys_lab_notebook';
    let entries = [];

    function loadEntries() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try { entries = JSON.parse(stored); } catch(e) { entries = []; }
        } else entries = [];
        render();
    }
    function saveEntries() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        render();
    }
    function render() {
        const container = document.getElementById('entriesContainer');
        if (entries.length === 0) {
            container.innerHTML = '<p style="color:var(--dim); text-align:center;">Zatím žádné záznamy.</p>';
            return;
        }
        container.innerHTML = '';
        entries.forEach((entry, idx) => {
            const div = document.createElement('div');
            div.className = 'entry';
            div.innerHTML = `
                <div class="entry-meta">
                    <span>🎭 ${entry.domainLabel || entry.domain || '?'}</span>
                    <span>📅 ${new Date(entry.timestamp).toLocaleString('cs-CZ')}</span>
                </div>
                <div class="entry-text">${escapeHtml(entry.content)}</div>
                <div class="entry-actions">
                    <button class="copy-btn" data-text="${escapeHtml(entry.content)}">📋 Kopírovat</button>
                    <button class="delete-btn" data-idx="${idx}">🗑 Smazat</button>
                </div>
            `;
            container.appendChild(div);
        });
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                navigator.clipboard.writeText(btn.getAttribute('data-text'));
                alert('Zkopírováno');
            });
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.getAttribute('data-idx'));
                entries.splice(idx, 1);
                saveEntries();
            });
        });
    }

    function exportJSON() {
        const dataStr = JSON.stringify(entries, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `zapisnik_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importJSON(file) {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    entries = imported;
                    saveEntries();
                    alert(`Načteno ${imported.length} záznamů.`);
                } else alert('Soubor neobsahuje pole.');
            } catch(err) { alert('Chyba JSON.'); }
        };
        reader.readAsText(file);
    }

    document.getElementById('exportBtn').addEventListener('click', exportJSON);
    document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('clearBtn').addEventListener('click', () => {
        if (confirm('Smazat všechny záznamy?')) { entries = []; saveEntries(); }
    });
    document.getElementById('importFile').addEventListener('change', e => {
        if (e.target.files.length) importJSON(e.target.files[0]);
        e.target.value = '';
    });

    function escapeHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    loadEntries();
</script>
</body>
</html>
