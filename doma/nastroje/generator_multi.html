<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generátor · Chceš myš?</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f0d0a; --s: #171410; --s2: #1e1a14; --cream: #e8e0d0;
            --dim: rgba(232,224,208,0.42); --dim2: rgba(232,224,208,0.2);
            --accent: #a89880; --accent2: #786858;
            --border: rgba(168,152,128,0.14); --border-hi: rgba(168,152,128,0.3);
            --serif: 'Cormorant Garamond', serif; --mono: 'DM Mono', monospace;
        }
        body {
            background: var(--bg); color: var(--cream);
            font-family: var(--mono); font-size: 13px; line-height: 1.8;
            padding: 30px 20px;
        }
        .wrap { max-width: 1300px; margin: 0 auto; }

        nav {
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
            background: rgba(15,13,10,0.94); backdrop-filter: blur(14px);
            padding: 11px 24px; display: flex; align-items: center;
            justify-content: space-between; flex-wrap: wrap; gap: 10px;
            margin-bottom: 30px;
        }
        .nav-brand { font-family: var(--serif); font-size: 0.88rem; font-weight: 300; }
        .nav-brand em { font-style: italic; color: var(--accent); }
        .nav-links { display: flex; gap: 4px; flex-wrap: wrap; }
        .nav-link {
            font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--dim); padding: 4px 9px; border: 1px solid transparent;
            transition: all 0.12s;
        }
        .nav-link:hover { color: var(--cream); border-color: var(--border); }

        .toolbar {
            background: var(--s); border: 1px solid var(--border);
            padding: 15px; margin-bottom: 20px;
            display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
            justify-content: space-between;
        }
        .dataset-selector { display: flex; align-items: center; gap: 8px; }
        .dataset-selector select, button {
            background: var(--s2); border: 1px solid var(--border);
            padding: 5px 10px; font-family: var(--mono); color: var(--cream);
            cursor: pointer;
        }
        button { background: var(--s); }
        button:hover { border-color: var(--accent); }
        button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        .filter-area {
            display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
            margin-bottom: 20px; padding: 12px; background: var(--s2);
            border: 1px solid var(--border);
        }
        .filter-group { display: flex; align-items: center; gap: 6px; }
        .filter-group label { font-size: 0.7rem; text-transform: uppercase; color: var(--dim); }
        .filter-group input, .filter-group select {
            background: var(--s); border: 1px solid var(--border);
            padding: 4px 8px; color: var(--cream); font-family: var(--mono);
            font-size: 0.7rem;
        }

        .blocks-grid {
            display: flex; flex-wrap: wrap; gap: 12px; margin: 20px 0;
            max-height: 400px; overflow-y: auto; padding: 4px;
        }
        .block-card {
            background: var(--s); border: 1px solid var(--border);
            width: 260px; padding: 12px; cursor: pointer; transition: 0.1s;
        }
        .block-card.selected { background: var(--s2); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
        .block-text { font-family: var(--serif); font-size: 0.85rem; margin-bottom: 8px; }
        .block-meta { font-size: 0.6rem; color: var(--dim); display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .block-meta span { background: var(--bg); padding: 1px 4px; }

        .selection-panel {
            background: var(--s2); border: 1px solid var(--border);
            padding: 12px; margin: 20px 0;
        }
        .permutation-grid {
            display: flex; flex-wrap: wrap; gap: 20px; margin: 20px 0;
        }
        .permutation-card {
            background: var(--s); border: 1px solid var(--border);
            padding: 12px; width: 260px;
        }
        .permutation-text { font-family: var(--serif); font-size: 0.85rem; margin-bottom: 8px; }
        .permutation-meta { font-size: 0.6rem; color: var(--dim); margin-top: 6px; }

        footer {
            margin-top: 60px; border-top: 1px solid var(--border);
            padding-top: 20px; font-size: 0.7rem; color: var(--dim2);
            text-align: center;
        }
    </style>
</head>
<body>
<div class="wrap">
    <nav>
        <span class="nav-brand"><em>Chceš myš?</em> — generátor</span>
        <div class="nav-links">
            <a class="nav-link" href="laborator.html">🔮 Laboratoř</a>
            <a class="nav-link" href="generator_demo.html">🎭 Demo generátor</a>
            <a class="nav-link" href="../index.html">🏠 Hlavní stránka</a>
        </div>
    </nav>

    <div class="toolbar">
        <div class="dataset-selector">
            <span>📂 Dataset:</span>
            <select id="datasetSelect">
                <option value="free_20.json">Demo (free_20.json)</option>
                <option value="0_100.json">0–100</option>
                <option value="101_200.json">101–200</option>
                <option value="201_300.json">201–300</option>
                <option value="301_400.json">301–400</option>
                <option value="vlastni_1.json">Vlastní 1</option>
                <option value="vlastni_2.json">Vlastní 2</option>
            </select>
            <button id="loadDatasetBtn" class="primary">Načíst</button>
        </div>
        <div>
            <button id="randomBlockBtn">🎲 Náhodný blok</button>
            <button id="clearSelectionBtn">✖ Zrušit výběr</button>
        </div>
    </div>

    <div class="filter-area">
        <div class="filter-group"><label>Typ:</label><select id="filterType"><option value="">Vše</option></select></div>
        <div class="filter-group"><label>Pole:</label><input id="filterFields" placeholder="hledat"></div>
        <div class="filter-group"><label>Intenzita:</label><select id="filterIntensity"><option value="">Vše</option><option>nízká</option><option>střední</option><option>vysoká</option></select></div>
        <div class="filter-group"><label>Movement:</label><input id="filterMovement" placeholder="část"></div>
        <button id="applyFilters">Filtrovat</button>
        <button id="resetFilters">Reset</button>
    </div>

    <div id="blocksGrid" class="blocks-grid"></div>

    <div class="selection-panel" id="selectionPanel" style="display:none;">
        <h3 style="font-family:var(--serif);">Vybraný blok</h3>
        <div id="selectedBlockInfo"></div>
        <div class="filter-group" style="margin: 12px 0;">
            <label>🎭 Doména / médium:</label>
            <select id="domainSelect">
                <option value="science">🔬 Věda / teorie</option>
                <option value="film">🎬 Film / scénář</option>
                <option value="theater">🎭 Divadlo / postavy</option>
                <option value="visual">🎨 Vizuální umění</option>
                <option value="choreo">💃 Choreografie</option>
                <option value="game">🎮 Herní design</option>
                <option value="performance">✨ Performativní umění</option>
            </select>
        </div>
        <button id="generatePermutationsBtn" class="primary">Generovat permutace</button>
        <div id="permutationsContainer" class="permutation-grid"></div>
    </div>

    <footer>Generátor · Vyber blok, zvol médium, získej 6 permutací a pošli do laboratoře.</footer>
</div>

<script>
    // -------------------- DATA --------------------
    let allBlocks = [];
    let filteredBlocks = [];
    let selectedBlock = null;
    let currentDataset = 'free_20.json';

    // DOM elements
    const datasetSelect = document.getElementById('datasetSelect');
    const loadBtn = document.getElementById('loadDatasetBtn');
    const randomBlockBtn = document.getElementById('randomBlockBtn');
    const clearSelectionBtn = document.getElementById('clearSelectionBtn');
    const filterType = document.getElementById('filterType');
    const filterFields = document.getElementById('filterFields');
    const filterIntensity = document.getElementById('filterIntensity');
    const filterMovement = document.getElementById('filterMovement');
    const applyFiltersBtn = document.getElementById('applyFilters');
    const resetFiltersBtn = document.getElementById('resetFilters');
    const blocksGrid = document.getElementById('blocksGrid');
    const selectionPanel = document.getElementById('selectionPanel');
    const selectedBlockInfo = document.getElementById('selectedBlockInfo');
    const generatePermutationsBtn = document.getElementById('generatePermutationsBtn');
    const permutationsContainer = document.getElementById('permutationsContainer');
    const domainSelect = document.getElementById('domainSelect');

    // -------------------- NAČTENÍ DAT --------------------
    async function loadDataset(filename) {
        try {
            const response = await fetch(`../dataset/${filename}`);
            if (!response.ok) throw new Error();
            const data = await response.json();
            if (Array.isArray(data)) allBlocks = data;
            else if (data.blocks && Array.isArray(data.blocks)) allBlocks = data.blocks;
            else throw new Error();
            updateFilterOptions();
            applyFilters();
            selectedBlock = null;
            selectionPanel.style.display = 'none';
            document.getElementById('selectedBlockInfo').innerHTML = '';
            permutationsContainer.innerHTML = '';
        } catch(err) {
            alert(`Nepodařilo se načíst ${filename}.`);
            allBlocks = [];
            filteredBlocks = [];
            renderBlocks();
        }
    }

    function updateFilterOptions() {
        const types = [...new Set(allBlocks.map(b => b.type).filter(t => t))];
        filterType.innerHTML = '<option value="">Vše</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    function applyFilters() {
        const typeVal = filterType.value;
        const fieldsVal = filterFields.value.trim().toLowerCase();
        const intensityVal = filterIntensity.value;
        const movementVal = filterMovement.value.trim().toLowerCase();

        filteredBlocks = allBlocks.filter(block => {
            if (typeVal && block.type !== typeVal) return false;
            if (intensityVal && block.intensity !== intensityVal) return false;
            if (fieldsVal) {
                const fieldsStr = (block.fields || []).join(' ').toLowerCase();
                if (!fieldsStr.includes(fieldsVal)) return false;
            }
            if (movementVal) {
                const movStr = (block.movement || '').toLowerCase();
                if (!movStr.includes(movementVal)) return false;
            }
            return true;
        });
        renderBlocks();
    }

    function resetFilters() {
        filterType.value = '';
        filterFields.value = '';
        filterIntensity.value = '';
        filterMovement.value = '';
        applyFilters();
    }

    function renderBlocks() {
        blocksGrid.innerHTML = '';
        if (filteredBlocks.length === 0) {
            blocksGrid.innerHTML = '<p style="color:var(--dim);">Žádné bloky neodpovídají filtrům.</p>';
            return;
        }
        filteredBlocks.forEach(block => {
            const card = document.createElement('div');
            card.className = 'block-card';
            if (selectedBlock === block) card.classList.add('selected');
            card.innerHTML = `
                <div class="block-text">“${escapeHtml(block.text)}”</div>
                <div class="block-meta">
                    <span>${block.type || '?'}</span>
                    <span>${block.intensity || '?'}</span>
                    <span>${block.movement || '?'}</span>
                    <span>${(block.fields || []).slice(0,2).join(', ')}</span>
                </div>
            `;
            card.addEventListener('click', () => {
                selectedBlock = block;
                renderBlocks(); // znovu vykreslí, aby zvýraznil
                showSelectionPanel();
            });
            blocksGrid.appendChild(card);
        });
    }

    function showSelectionPanel() {
        if (!selectedBlock) return;
        selectionPanel.style.display = 'block';
        selectedBlockInfo.innerHTML = `
            <div class="block-text">“${escapeHtml(selectedBlock.text)}”</div>
            <div class="block-meta" style="margin-top:6px;">
                <span>${selectedBlock.type || '?'}</span>
                <span>${selectedBlock.intensity || '?'}</span>
                <span>${selectedBlock.movement || '?'}</span>
                <span>${(selectedBlock.fields || []).slice(0,2).join(', ')}</span>
            </div>
        `;
        permutationsContainer.innerHTML = '';
    }

    // -------------------- PERMUTACE --------------------
    function getPermutations(arr) {
        if (arr.length === 0) return [[]];
        const result = [];
        for (let i = 0; i < arr.length; i++) {
            const rest = [...arr.slice(0,i), ...arr.slice(i+1)];
            const perms = getPermutations(rest);
            for (const perm of perms) {
                result.push([arr[i], ...perm]);
            }
        }
        return result;
    }

    function generatePermutations(block, domain) {
        // Vezmi fields, pokud má alespoň 3, jinak použij text a rozděl na slova
        let items = block.fields && block.fields.length >= 3 ? block.fields : block.text.split(/\s+/).slice(0,3);
        if (items.length < 3) items = [...items, '?', '?', '?'].slice(0,3);
        const perms = getPermutations(items);
        // Vezmeme jen prvních 6 (stejný počet)
        const sixPerms = perms.slice(0,6);

        // Šablony pro různé domény
        const templates = {
            science: (a,b,c) => `Hypotéza: Vztah mezi fenomény „${a}“, „${b}“ a „${c}“ vede k novému modelu.`,
            film: (a,b,c) => `Scénář: Postava A ztělesňuje „${a}“, postava B „${b}“, postava C „${c}“. Konflikt vychází z jejich vzájemného působení.`,
            theater: (a,b,c) => `Divadelní postavy: 1: „${a}“, 2: „${b}“, 3: „${c}“. Jejich monology odhalují skryté významy.`,
            visual: (a,b,c) => `Vizuální umění: Koláž kombinující prvky „${a}“, „${b}“ a „${c}“. Doporučená technika: digitální montáž.`,
            choreo: (a,b,c) => `Choreografie: Tři pohybové motivy – „${a}“, „${b}“, „${c}“ – se střídají a prolínají.`,
            game: (a,b,c) => `Herní design: Mechanika „${a}“ ovlivňuje cíl „${b}“, zatímco „${c}“ mění pravidla.`,
            performance: (a,b,c) => `Performativní umění: Intervence založená na „${a}“, „${b}“ a „${c}“. Publikum je aktivním spoluhráčem.`
        };
        const tmpl = templates[domain] || templates.science;
        return sixPerms.map(perm => tmpl(perm[0], perm[1], perm[2]));
    }

    function saveToLibrary(block, permText, domainLabel) {
        let library = JSON.parse(localStorage.getItem('chcesmys_user_blocks') || '[]');
        const newBlock = {
            id: 'gen_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
            text: permText,
            type: `generovaný ${domainLabel} blok`,
            function: `Permutace z bloku ${block.id || ''}`,
            fields: block.fields ? [...block.fields] : [],
            movement: block.movement || '',
            intensity: block.intensity || 'střední',
            language: 'cs',
            created: new Date().toISOString(),
            source: 'generátor'
        };
        library.push(newBlock);
        localStorage.setItem('chcesmys_user_blocks', JSON.stringify(library));
        alert('Uloženo do knihovny (laboratoř).');
    }

    generatePermutationsBtn.addEventListener('click', () => {
        if (!selectedBlock) return;
        const domain = domainSelect.value;
        const domainLabel = domainSelect.options[domainSelect.selectedIndex].text;
        const permutations = generatePermutations(selectedBlock, domain);
        permutationsContainer.innerHTML = '';
        permutations.forEach((perm, idx) => {
            const card = document.createElement('div');
            card.className = 'permutation-card';
            card.innerHTML = `
                <div class="permutation-text">${escapeHtml(perm)}</div>
                <div class="permutation-meta">Permutace ${idx+1}</div>
                <button class="save-permutation" data-perm="${escapeHtml(perm)}">📥 Uložit do laboratoře</button>
            `;
            card.querySelector('.save-permutation').addEventListener('click', (e) => {
                const permText = e.target.getAttribute('data-perm');
                saveToLibrary(selectedBlock, permText, domainLabel);
            });
            permutationsContainer.appendChild(card);
        });
    });

    // -------------------- NÁHODNÝ BLOK --------------------
    randomBlockBtn.addEventListener('click', () => {
        if (filteredBlocks.length === 0) return;
        const idx = Math.floor(Math.random() * filteredBlocks.length);
        selectedBlock = filteredBlocks[idx];
        renderBlocks();
        showSelectionPanel();
    });

    clearSelectionBtn.addEventListener('click', () => {
        selectedBlock = null;
        renderBlocks();
        selectionPanel.style.display = 'none';
    });

    // -------------------- OSTATNÍ --------------------
    loadBtn.addEventListener('click', () => loadDataset(datasetSelect.value));
    applyFiltersBtn.addEventListener('click', applyFilters);
    resetFiltersBtn.addEventListener('click', resetFilters);

    function escapeHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // Počáteční načtení
    loadDataset('free_20.json');
</script>
</body>
</html>
